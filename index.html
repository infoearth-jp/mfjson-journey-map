<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>移動履歴アニメーション</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="js/functions.js"></script>
</head>
<body>
    <h1>移動履歴アニメーション</h1>
    <div id="fileSection">
        <input type="file" id="fileInput" accept=".json">
    </div>
    <div id="buttonSection">
        <button id="slice30Button" disabled>30秒間隔に切り替え</button>
        <button id="slice10Button" disabled>10秒間隔に切り替え</button>
        <button id="rawButton" disabled>元データに切り替え</button>
    </div>
    <div id="map">
        <div id="time-label">時刻: --:--:--</div>
    </div>

    <script>
        let map = L.map("map").setView([34.6833, 137.5720], 15); // 初期位置
        L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 19,
            referrerPolicy: "strict-origin-when-cross-origin",
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
        }).addTo(map);

        let polyline, marker, locations = [], index = 0, intervalId = null;
        let rawLocations = [], sliced10Locations = [], sliced30Locations = [];
        const timeLabel = document.getElementById("time-label");
        const slice10Button = document.getElementById("slice10Button");
        const slice30Button = document.getElementById("slice30Button");
        const rawButton = document.getElementById("rawButton");

        document.getElementById("fileInput").addEventListener("change", handleFile);
        slice10Button.addEventListener("click", () => switchLocations(sliced10Locations));
        slice30Button.addEventListener("click", () => switchLocations(sliced30Locations));
        rawButton.addEventListener("click", () => switchLocations(rawLocations));
    </script>
</body>
</html>
